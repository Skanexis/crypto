<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Pagamento Fattura Crypto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell fade-in">
      <section class="glass">
        <div class="header">
          <h1>Pagamento Fattura</h1>
          <p>Effettua il pagamento in USDT, BTC o ETH.</p>
          <div class="hero-meta">
            <span class="chip">Importo: <strong id="usdAmount">-</strong></span>
            <span class="chip">Scadenza: <strong id="expiresAt">-</strong></span>
            <span class="chip">Tempo restante: <strong id="countdown">-</strong></span>
          </div>
        </div>

        <div class="content">
          <div class="grid">
            <div class="card">
              <div class="label">Stato fattura</div>
              <div id="statusBadge" class="status pending">In attesa</div>
              <div class="notice" id="statusHint">
                Invia esattamente l'importo richiesto e attendi la conferma on-chain.
              </div>
            </div>
          </div>

          <div id="currencyList" class="currency-list" style="margin-top: 14px"></div>

          <div id="finalMessage" class="notice hidden"></div>
        </div>
      </section>
    </main>

    <script>
      const token = window.location.pathname.split("/").filter(Boolean).pop();
      const state = {
        invoice: null,
        countdownTimer: null,
        pollTimer: null,
      };

      function formatDate(value) {
        return new Date(value).toLocaleString("it-IT");
      }

      function formatCountdown(ms) {
        if (ms <= 0) return "scaduta";
        const totalSec = Math.floor(ms / 1000);
        const hh = Math.floor(totalSec / 3600)
          .toString()
          .padStart(2, "0");
        const mm = Math.floor((totalSec % 3600) / 60)
          .toString()
          .padStart(2, "0");
        const ss = Math.floor(totalSec % 60)
          .toString()
          .padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function setStatus(status) {
        const badge = document.getElementById("statusBadge");
        const hint = document.getElementById("statusHint");
        badge.className = `status ${status}`;

        if (status === "paid") {
          badge.textContent = "Pagata";
          hint.textContent = "Pagamento confermato. Grazie.";
        } else if (status === "expired") {
          badge.textContent = "Scaduta";
          hint.textContent = "La fattura è scaduta. Contatta l'amministratore per una nuova fattura.";
        } else if (status === "cancelled") {
          badge.textContent = "Annullata";
          hint.textContent = "La fattura è stata annullata.";
        } else {
          badge.textContent = "In attesa";
          hint.textContent = "Invia esattamente l'importo richiesto e attendi la conferma on-chain.";
        }
      }

      async function copyToClipboard(value) {
        try {
          await navigator.clipboard.writeText(value);
          alert("Indirizzo copiato.");
        } catch (error) {
          alert("Copia non riuscita.");
        }
      }

      function renderPayments(payments, invoiceStatus) {
        const root = document.getElementById("currencyList");
        root.innerHTML = "";

        for (const payment of payments) {
          const wrap = document.createElement("article");
          wrap.className = "currency-card";

          const statusText = payment.status === "confirmed" ? "confermato" : "in attesa";
          wrap.innerHTML = `
            <div class="currency-head">
              <div class="currency-tag">${payment.currency} <small style="opacity:.75">(${payment.network})</small></div>
              <div class="status ${payment.status === "confirmed" ? "paid" : "pending"}">${statusText}</div>
            </div>
            <div class="label">Importo da inviare</div>
            <div class="amount mono">${payment.expectedAmountCrypto} ${payment.currency}</div>
            <div class="label" style="margin-top:8px">Indirizzo wallet</div>
            <div class="wallet mono">${payment.walletAddress}</div>
            <div class="actions">
              <button class="btn-secondary" type="button">Copia indirizzo</button>
              <button class="btn-primary" type="button">Apri wallet</button>
            </div>
            <div class="qr-wrap">
              <img src="${payment.qrDataUrl}" alt="QR ${payment.currency}" />
            </div>
          `;

          const [copyBtn, openBtn] = wrap.querySelectorAll("button");
          copyBtn.addEventListener("click", () => copyToClipboard(payment.walletAddress));
          openBtn.addEventListener("click", () => {
            window.location.href = payment.qrText;
          });

          if (invoiceStatus !== "pending") {
            copyBtn.disabled = true;
            openBtn.disabled = true;
          }

          root.appendChild(wrap);
        }
      }

      function refreshCountdown() {
        if (!state.invoice) return;
        const remaining = new Date(state.invoice.expiresAt).getTime() - Date.now();
        document.getElementById("countdown").textContent = formatCountdown(remaining);
      }

      function applyInvoice(invoice) {
        state.invoice = invoice;
        document.getElementById("usdAmount").textContent = `${invoice.amountUsd.toFixed(2)} USD`;
        document.getElementById("expiresAt").textContent = formatDate(invoice.expiresAt);
        setStatus(invoice.status);
        renderPayments(invoice.payments, invoice.status);
        refreshCountdown();

        const final = document.getElementById("finalMessage");
        if (invoice.status === "paid") {
          final.classList.remove("hidden");
          final.textContent = "Pagamento ricevuto e confermato. Puoi chiudere questa pagina.";
        } else if (invoice.status === "expired") {
          final.classList.remove("hidden");
          final.textContent = "Fattura scaduta. Richiedi una nuova fattura all'amministratore.";
        } else {
          final.classList.add("hidden");
          final.textContent = "";
        }
      }

      async function loadInvoice() {
        const response = await fetch(`/api/invoices/${token}`);
        if (!response.ok) {
          throw new Error("Fattura non trovata");
        }
        const data = await response.json();
        applyInvoice(data.invoice);
      }

      async function bootstrap() {
        try {
          await loadInvoice();

          state.countdownTimer = setInterval(refreshCountdown, 1000);
          state.pollTimer = setInterval(async () => {
            try {
              await loadInvoice();
              if (state.invoice.status !== "pending") {
                clearInterval(state.pollTimer);
              }
            } catch (_error) {}
          }, 12000);
        } catch (error) {
          const root = document.querySelector(".content");
          root.innerHTML = `<div class="notice">Errore: ${error.message}</div>`;
        }
      }

      bootstrap();
    </script>
  </body>
</html>
