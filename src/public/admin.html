<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Admin - Fatture Crypto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell fade-in">
      <section class="glass">
        <div class="header">
          <h1>Pannello Admin</h1>
          <p>Crea e gestisci fatture in USD con pagamento crypto.</p>
        </div>

        <div class="content grid cols-2">
          <section class="card">
            <h3>Crea fattura</h3>
            <div class="label" style="margin-top: 12px">API Key admin</div>
            <input id="apiKey" type="password" placeholder="Inserisci x-api-key" />

            <div class="label" style="margin-top: 12px">Importo USD</div>
            <input id="amountUsd" type="number" min="0.01" step="0.01" value="100.00" />

            <div class="label" style="margin-top: 12px">Telegram User ID cliente (opzionale)</div>
            <input id="telegramUserId" type="text" placeholder="es. 123456789" />

            <div class="label" style="margin-top: 12px">Valute abilitate</div>
            <div class="checks">
              <label><input type="checkbox" value="USDT" checked /> USDT</label>
              <label><input type="checkbox" value="BTC" checked /> BTC</label>
              <label><input type="checkbox" value="ETH" checked /> ETH</label>
            </div>

            <div class="actions" style="margin-top: 14px">
              <button id="createBtn" class="btn-primary" type="button">Crea fattura</button>
            </div>

            <div id="createResult" class="notice admin-result hidden"></div>
          </section>

          <section class="card">
            <h3>Gestione rapida</h3>
            <div class="label" style="margin-top: 12px">Invoice ID</div>
            <input id="invoiceId" type="text" placeholder="UUID fattura" />

            <div class="label" style="margin-top: 12px">Valuta pagata</div>
            <select id="paidCurrency">
              <option value="USDT">USDT</option>
              <option value="BTC">BTC</option>
              <option value="ETH">ETH</option>
            </select>

            <div class="label" style="margin-top: 12px">TX hash (opzionale)</div>
            <input id="txHash" type="text" placeholder="Hash transazione" />

            <div class="actions" style="margin-top: 14px">
              <button id="statusBtn" class="btn-secondary" type="button">Controlla stato</button>
              <button id="markPaidBtn" class="btn-primary" type="button">Segna come pagata</button>
              <button id="verifyNowBtn" class="btn-secondary" type="button">Verifica on-chain ora</button>
            </div>

            <div id="manageResult" class="notice admin-result hidden"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      function getApiKey() {
        return document.getElementById("apiKey").value.trim();
      }

      function setResult(id, content, isError = false) {
        const el = document.getElementById(id);
        el.classList.remove("hidden");
        el.style.borderColor = isError ? "#ef7b3a" : "#c9dae8";
        el.textContent = content;
      }

      function selectedCurrencies() {
        return [...document.querySelectorAll('input[type="checkbox"]:checked')].map((item) => item.value);
      }

      async function createInvoice() {
        const amountUsd = Number(document.getElementById("amountUsd").value);
        const telegramUserId = document.getElementById("telegramUserId").value.trim();
        const allowedCurrencies = selectedCurrencies();

        if (!allowedCurrencies.length) {
          setResult("createResult", "Seleziona almeno una valuta.", true);
          return;
        }

        const response = await fetch("/api/invoices", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-api-key": getApiKey(),
          },
          body: JSON.stringify({
            amount_usd: amountUsd,
            telegram_user_id: telegramUserId || null,
            allowed_currencies: allowedCurrencies,
          }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Errore creazione fattura");
        }

        const invoice = data.invoice;
        setResult(
          "createResult",
          `Fattura creata.\nID: ${invoice.id}\nLink: ${invoice.paymentUrl}\nScadenza: ${new Date(invoice.expiresAt).toLocaleString("it-IT")}`,
        );
        document.getElementById("invoiceId").value = invoice.id;
      }

      async function checkStatus() {
        const invoiceId = document.getElementById("invoiceId").value.trim();
        if (!invoiceId) {
          setResult("manageResult", "Inserisci Invoice ID.", true);
          return;
        }

        const response = await fetch(`/api/invoices/id/${invoiceId}/status`, {
          headers: {
            "x-api-key": getApiKey(),
          },
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Errore stato fattura");
        }

        const status = data.status;
        setResult(
          "manageResult",
          `Stato: ${status.status}\nImporto: ${status.amountUsd.toFixed(2)} USD\nLink: ${status.paymentUrl}`,
        );
      }

      async function markPaid() {
        const invoiceId = document.getElementById("invoiceId").value.trim();
        if (!invoiceId) {
          setResult("manageResult", "Inserisci Invoice ID.", true);
          return;
        }

        const response = await fetch(`/api/invoices/${invoiceId}/mark-paid`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-api-key": getApiKey(),
          },
          body: JSON.stringify({
            currency: document.getElementById("paidCurrency").value,
            tx_hash: document.getElementById("txHash").value.trim() || null,
            confirmations: 1,
          }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Errore conferma pagamento");
        }

        if (data.changed) {
          setResult(
            "manageResult",
            `Fattura aggiornata.\nNuovo stato: ${data.invoice.status}\nID: ${data.invoice.id}`,
          );
        } else {
          setResult(
            "manageResult",
            `Nessuna modifica.\nStato attuale: ${data.invoice.status}\nMotivo: ${data.reason || "n/a"}`,
          );
        }
      }

      async function verifyNow() {
        const response = await fetch("/api/payments/verify-now", {
          method: "POST",
          headers: {
            "x-api-key": getApiKey(),
          },
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Errore verifica on-chain");
        }
        setResult(
          "manageResult",
          `Verifica completata.\nControllate: ${data.summary.checked}\nPagate: ${data.summary.paid}\nErrori: ${data.summary.errors.length}`,
        );
      }

      document.getElementById("createBtn").addEventListener("click", async () => {
        try {
          await createInvoice();
        } catch (error) {
          setResult("createResult", error.message, true);
        }
      });

      document.getElementById("statusBtn").addEventListener("click", async () => {
        try {
          await checkStatus();
        } catch (error) {
          setResult("manageResult", error.message, true);
        }
      });

      document.getElementById("markPaidBtn").addEventListener("click", async () => {
        try {
          await markPaid();
        } catch (error) {
          setResult("manageResult", error.message, true);
        }
      });

      document.getElementById("verifyNowBtn").addEventListener("click", async () => {
        try {
          await verifyNow();
        } catch (error) {
          setResult("manageResult", error.message, true);
        }
      });
    </script>
  </body>
</html>
